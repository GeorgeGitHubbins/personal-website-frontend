name: Periodic Website Improvement

on:
  schedule:
    - cron: '0 4 */3 * *' # Runs every 3 days at 4:00 AM UTC (Off-peak)
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  improve-website:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history for better context
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: personal-website-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: personal-website-frontend
        run: npm install

      - name: Pre-configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Lint Project
        working-directory: personal-website-frontend
        run: npm run lint || echo "Linting failed, but continuing to allow Gemini to fix it."

      - name: Run Gemini CLI Autonomous Session
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'eu-central-1'
        working-directory: personal-website-frontend
        run: |
          gemini --skip-trust --prompt "Follow the 'Gemini CLI: Autonomous Mode Instructions' in GEMINI.md. Pick ONE logical task from TODO.md or identify a small improvement. Implement it, verify with 'npm run build', and commit the change with a clear message. Spend no more than 45 minutes. Do not ask for user input." --approval-mode yolo

      - name: Push Changes
        run: |
          git push || echo "Nothing to push"

      - name: Deploy to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'eu-central-1'
        working-directory: personal-website-frontend
        run: |
          aws s3 sync dist/ s3://ai.georgegittins.com --delete

      - name: Invalidate CloudFront Cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'us-east-1' # CloudFront is global but usually managed from us-east-1
        run: |
          aws cloudfront create-invalidation --distribution-id E1IOHS3BJD2FUN --paths "/*"
