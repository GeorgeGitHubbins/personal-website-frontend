name: Daily Website Improvement

on:
  schedule:
    - cron: '0 4 * * *' # Runs daily at 4:00 AM UTC (Off-peak)
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  improve-website:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history for better context
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: |
          npm install
          git checkout package-lock.json # Prevent agent from over-analyzing lockfile changes

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini CLI Autonomous Session
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'eu-central-1'
        run: |
          gemini --prompt "Analyze the current state of the project. Pick the top priority task from TODO.md or identify a critical UI/UX improvement. Implement the change, run 'npm run build' to verify, and commit the results. Spend no more than 45 minutes. Do not ask for user input." --approval-mode yolo

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "chore: autonomous daily improvement [skip ci]" || echo "No changes to commit"
          git push

      - name: Deploy to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'eu-central-1'
        run: |
          aws s3 sync dist/ s3://ai.georgegittins.com --delete

      - name: Invalidate CloudFront Cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'us-east-1' # CloudFront is global but usually managed from us-east-1
        run: |
          aws cloudfront create-invalidation --distribution-id E1IOHS3BJD2FUN --paths "/*"
